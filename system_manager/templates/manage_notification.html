{% extends "home/base.html" %}
{% block title %}Manage Notification{% endblock %}
{% block major %}{% endblock %}
{% block content %}

<h2>Manage Notification</h2>
<p>Edit the current notification and save it.</p>

<form method="post" action="{% url 'update_notification' notification.id %}">
    {% csrf_token %}

    <label>Title</label>
    <input
        type="text"
        name="title"
        value="{{ notification.title }}"
        style="padding:6px; width:300px;"
    >

    <label>Message</label>
    <textarea
        name="message"
        style="padding:6px; width:420px; height:120px;"
    >{{ notification.message }}</textarea>

    <label>Status</label>
    <select name="status" style="padding:6px; width:200px;">
        <option value="active" {% if notification.status == "active" %}selected{% endif %}>Active</option>
        <option value="inactive" {% if notification.status == "inactive" %}selected{% endif %}>Inactive</option>
    </select>

    <button
        type="submit"
        style="padding:6px 14px; background:#4c61af; color:white; border:none; border-radius:4px; cursor:pointer;"
    >
        Save
    </button>
    <label>{{ info }}</label>

</form>

{% endblock %}
