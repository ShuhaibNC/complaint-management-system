{% extends "home/base.html" %}
{% block title %}Register{% endblock %}
{% block header %}<h2 style="font-weight: bold;">SIGN UP</h2>{% endblock %}
{% block content %}
<div class="container" style="max-width:600px; margin:40px auto; padding:20px; border-radius:10px; box-shadow:0 2px 10px #0000001a;background-color: #272832;">
    <h2 style="text-align:center;">Create User Account</h2>
    <form method="POST" action="">
        {% csrf_token %}
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:5px;">

        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required placeholder="johndoe" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:5px;">

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required placeholder="" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:5px;">

        <label for="password">Confirm Password:</label>
        <input type="password" id="cpassword" name="cpassword" required placeholder="" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:5px;">

        <button type="submit" style="width:100%; padding:12px; background-color:#404253; color:white; border:none; border-radius:5px; margin-top:10px; font-size:16px; cursor:pointer;">
            Sign Up
        </button>
    </form>
</div>
{% endblock %}
